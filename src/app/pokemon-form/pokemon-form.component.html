<h2>Add favorite Pokemon</h2>
<form [formGroup] = "pokemonForm" (ngSubmit) ="onSubmit()">
    <input formControlName="name" placeholder="Name">
    <input formControlName="type" placeholder="Type">
    <input formControlName="level" placeholder="Level">
    <input formControlName="nature" placeholder="Nature">

    <button type="submit"[disabled]="!pokemonForm.valid">Save to Database</button>
</form>
